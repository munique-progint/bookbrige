<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Página para cadastrar uma doação de material no BookBridge.">
    <meta name="author" content="BookBridge">

    <title>Doação Cadastro - BookBridge</title>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

</head>

<body>

    <!-- Navegação-->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color:#FBDD91;">
        <div class="container px-5">
            <a class="navbar-brand fs-2 fw-bold" href="index.html" style="color:#DF8F9C;">BookBridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link" href="materiais.html">Doações</a></li>
                    <li class="nav-item"><a class="nav-link" href="minha-conta.html">Minha Conta</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 mb-5">
        <div class="container px-5" style="margin-bottom: 150px;">

            <div class="text-center mb-5">

                <h2 class="fw-bolder" style="color:#4E0119;">
                    Doar Material
                </h2>

                <p class="fs-4">
                    Compartilhe materiais que podem ajudar outros estudantes.
                </p>

            </div>

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card shadow border-0 p-5 mx-auto" style="max-width: 700px; width: 100%;">

                        <label class="mb-2 fw-bold fs-5">
                            Nome do material
                        </label>

                        <input type="text" class="form-control fs-5 mb-4 w-100" placeholder="Ex: Livro de Matemática">


                        <label class="mb-2 fw-bold fs-5">
                            Categoria
                        </label>

                        <select class="form-control fs-5 mb-4">

                            <option>
                                Selecione
                            </option>

                            <option>
                                Livro
                            </option>

                            <option>
                                Apostila
                            </option>

                            <option>
                                Material escolar
                            </option>

                        </select>

                        <label class="mb-2 fw-bold fs-5">
                            Descrição
                        </label>

                        <textarea class="form-control fs-5 mb-4" rows="4"
                            placeholder="Conte um pouco sobre o material"></textarea>

                        <label class="mb-2 fw-bold fs-5">
                            Imagem do material
                        </label>

                        <input type="file" class="form-control mb-4">

                        <button class="btn px-4 py-2 rounded-pill fw-bold"
                            style="background-color:#4E0119; color:white;">
                            Enviar doação
                        </button>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4" style="background-color:#4E0119;">

        <div class="container text-center text-white">
            © 2026 BookBridge - Compartilhando conhecimento
        </div>

    </footer>

    <script src="js/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
