<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Página para alteração de senha do usuário no BookBridge.">
    <meta name="author" content="BookBridge">

    <title>Alterar senha - BookBridge</title>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">

    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="d-flex flex-column h-100">

    <main class="flex-shrink-0 minha-conta-page">

        <!-- Navegação-->
        <nav class="navbar navbar-expand-lg navbar-light" style="background-color:#FBDD91;">
            <div class="container px-5">
                <a class="navbar-brand fs-2 fw-bold" href="index.html" style="color:#DF8F9C;">BookBridge</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation"><span
                        class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                        <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                        <li class="nav-item"><a class="nav-link" href="materiais.html">Doações</a></li>
                        <li class="nav-item"><a class="nav-link" href="minha-conta.html">Minha Conta</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <section class="conta-section">

            <div class="container">

                <div class="conta-topo">

                    <h2 class="fw-bolder" style="color:#DF8F9C;">
                        Alterar Senha
                    </h2>

                    <p class="descricao-conta">
                        Altere sua senha para manter sua conta protegida.
                    </p>
                </div>
            </div>

            <div class="row justify-content-center">

                <div class="col-lg-5">

                    <div class="conta-card">

                        <form>

                            <div class="mb-4">
                                <label for="senhaAtual" class="form-label fw-bold">Senha atual</label>
                                <input type="password" class="form-control" id="senhaAtual "
                                    placeholder="Digite sua senha atual" required>
                            </div>

                            <div class="mb-4">
                                <label for="novaSenha" class="form-label fw-bold">Nova senha</label>
                                <input type="password" class="form-control" id="novaSenha"
                                    placeholder="Digite a nova senha" required>
                            </div>

                            <div class="mb-2">
                                <label for="confirmarSenha" class="form-label fw-bold">Confirmar nova senha</label>
                                <input type="password" class="form-control" id="confirmarSenha"
                                    placeholder="Confirme a nova senha" required>
                            </div>

                            <p class="text-muted mb-4" style="font-size: 0.95rem;">
                                A nova senha deve conter pelo menos 8 caracteres.
                            </p>

                            <div class="d-grid">

                                <button class="btn btn-lg w-100 btn-salvar">
                                    Salvar nova senha
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </section>

        <footer class="py-4 mt-auto" style="background-color:#4E0119;">

            <div class="container px-5">

                <div class="row align-items-center justify-content-between flex-column flex-sm-row">

                    <div class="col-auto">
                        <div class="small m-0 text-white">
                            © 2026 BookBridge - Compartilhando conhecimento
                        </div>
                    </div>
                </div>
            </div>

        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    
</body>

</html>
