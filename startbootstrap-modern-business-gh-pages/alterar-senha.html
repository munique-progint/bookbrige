<section class="conta-section">

    <div class="container">

        <div class="conta-topo">

          <h1 class="fs-1">Alterar Senha</h1>

<p class="descricao-conta">
    Altere sua senha para manter sua conta protegida.
</p>
        </div>

    </div>

<div class="row justify-content-center">

    <div class="col-lg-5">

        <div class="conta-card">


    <form>

    <div class="mb-4">
    <label for="senhaAtual" class="form-label fw-bold">Senha atual</label>
    <input
    type="password"
    class="form-control"
    id="senhaAtual"
    placeholder="Digite sua senha atual"
    style="font-size: 90px;">
</div>

<div class="mb-4">
    <label for="novaSenha" class="form-label fw-bold">Nova senha</label>
    <input type="password" class="form-control" id="novaSenha" placeholder="Digite a nova senha">
</div>

<div class="mb-2">
    <label for="confirmarSenha" class="form-label fw-bold">Confirmar nova senha</label>
    <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme a nova senha">
</div>

<p class="text-muted mb-4" style="font-size: 0.95rem;">
    A nova senha deve conter pelo menos 8 caracteres.
</p>




<div class="d-grid">

  <button class="btn btn-lg w-100 btn-salvar">
    Salvar nova senha
</button>

</div>


</form>
