<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Página para publicação de conteúdos digitais no BookBridge.">
    <meta name="author" content="BookBridge">

    <title>Cadastrar Conteúdo - BookBridge</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="css/styles.css" rel="stylesheet">

</head>

<body>

    <!-- Navegação-->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color:#FBDD91;">
        <div class="container px-5">
            <a class="navbar-brand fs-2 fw-bold" href="index.html" style="color:#DF8F9C;">BookBridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link" href="materiais.html">Doações</a></li>
                    <li class="nav-item"><a class="nav-link" href="minha-conta.html">Minha Conta</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 mb-5">
        <div class="container px-5" style="margin-bottom: 150px;">

            <div class="text-center mb-5">

                <h2 class="fw-bolder" style="color:#4E0119;">
                    Publique um material digital
                </h2>

                <p class="lead text-muted mb-1">
                    Compartilhe conteúdos que podem ajudar outros estudantes.
                </p>

            </div>

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card shadow border-0 p-5 mx-auto" style="max-width: 700px; width: 100%;">

                        <label class="mb-2 fw-bold fs-5">
                            Nome do conteúdo
                        </label>

                        <input type="text" class="form-control fs-5 mb-4 w-100"
                            placeholder="Ex: Resumo de Biologia-bioquímica" required>

                        <label class="mb-2 fw-bold fs-5">
                            Categoria
                        </label>

                        <select class="form-control fs-5 mb-4">

                            <option selected>
                                Selecione
                            </option>

                            <option>
                                Artigo
                            </option>

                            <option>
                                Apostila
                            </option>

                            <option>
                                Mapa mental
                            </option>

                            <option>
                                Lista de exercícios
                            </option>

                            <option>
                                Resumo
                            </option>

                            <option>
                                Simulados
                            </option>

                            <option>
                                Slides
                            </option>

                            <option>
                                Outros
                            </option>

                        </select>

                        <label class="mb-2 fw-bold fs-5">
                            Nível
                        </label>

                        <select class="form-control fs-5 mb-4">

                            <option selected>
                                Selecione
                            </option>

                            <option>
                                Ensino fundamental
                            </option>

                            <option>
                                Ensino médio
                            </option>


                            <option>
                                Ensino técnico
                            </option>

                            <option>
                                Ensino superior
                            </option>

                            <option>
                                Curso livre
                            </option>

                            <option>
                                Outros
                            </option>

                        </select>

                        <label class="mb-2 fw-bold fs-5">
                            Descrição
                        </label>

                        <textarea class="form-control fs-5 mb-4" rows="4" placeholder="Conte um pouco sobre o material"
                            required></textarea>

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Imagem de capa
                            </label>

                            <input type="file" class="form-control" accept=".jpg,.jpeg,.png" required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Arquivo do conteúdo (PDF)
                            </label>

                            <input type="file" class="form-control" accept=".pdf" required>

                        </div>

                        <button class="btn px-5 py-3 rounded-pill fw-bold fs-5"
                            style="background-color:#4E0119; color:white;">
                            Publicar
                        </button>

                    </div>
                </div>
            </div>
        </div>

    </section>

    <footer class="py-4 mt-auto" style="background-color:#4E0119;">
        <div class="container px-5">
            <div class="row align-items-center justify-content-between flex-column flex-sm-row">
                <div class="col-auto">
                    <div class="small m-0 text-white">© 2026 BookBridge - Compartilhando conhecimento</div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>

</body>

</html>
