<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="BookBridge" />
    <meta name="author" content="" />

    <title>Login | BookBridge</title>

    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <!-- Bootstrap Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- CSS -->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column h-100">

    <main class="flex-shrink-0">
    <section class="py-5" style="background-color: #FFF0B3; min-height: 100vh;">

    <div class="container">

        <div class="row align-items-center justify-content-center">

            <!-- ILUSTRAÇÃO -->
            <div class="col-lg-6 text-center mb-5 mb-lg-0">

                <img src="assets/img/fotologin.png"
                     class="img-fluid"
                     style="max-width: 90%;"
                     alt="Ilustração BookBridge">

            </div>

            
            <div class="col-lg-6 col-xl-6">

                <div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width: 600px;">

                    <div class="card-body p-5 px-5">

                        <div class="text-center mb-5">

                            <h1 style="color: var(--bb-rosa); font-weight:700;">
                                BookBridge
                            </h1>

                            <p class="text-muted fs-5 mb-0">
                                Crie sua conta
                            </p>

                        </div>

                        <form>
                <div class="mb-4">

                    <label class="form-label fw-semibold">
                     Nome completo
                    </label>

                    <div class="input-group">

                     <span class="input-group-text">
                      <i class="bi bi-person"></i>
                 </span>

                 <input
                     type="text"
                     class="form-control form-control-lg"
                     placeholder="Digite seu nome completo">

             </div>

</div>
                           <div class="mb-4">

                         <label class="form-label fw-semibold">
                         E-mail
                         </label>

                         <div class="input-group">

                         <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                         </span>

                         <input
                         type="email"
                         class="form-control form-control-lg"
                         placeholder="Digite seu e-mail">

    </div>

</div>

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Senha
                                </label>

                             <div class="input-group">

    

    <input
        id="senha"
        type="password"
        class="form-control form-control-lg"
        placeholder="Digite sua senha">

   
</div>
        <div class="mb-4">

    <label class="form-label fw-semibold">
        Confirmar senha
    </label>

    <input
        type="password"
        class="form-control form-control-lg"
        placeholder="Digite novamente sua senha">

</div>

                          <div class="mt-3 mb-4">

    <label class="form-label fw-semibold">
        Selecione o tipo de conta
    </label>

    <div class="form-check mt-2">

        <input
            class="form-check-input"
            type="radio"
            name="tipoUsuario"
            id="estudante"
            checked>

        <label class="form-check-label" for="estudante">
            Estudante
        </label>

    </div>

    <div class="form-check mt-2">

        <input
            class="form-check-input"
            type="radio"
            name="tipoUsuario"
            id="colaborador">

        <label class="form-check-label" for="colaborador">
            Colaborador Educacional
        </label>

    </div>
    

</div>
          
 
            <button
             class="btn w-100 rounded-pill py-2 fw-bold mt-2"
             style="background:#DF8F9C; color:#4E0119;">
            Criar conta
            </button>


                        </form>

                        <hr class="my-2">

                        <div class="text-center">

                            <p class="mb-2">
                                Já possui uma conta?
                            </p>

                           <a href="login.html"
                    class="btn rounded-pill py-2 fw-semibold botao-secundario w-100"
                    style="border: 2px solid #DF8F9C; color: #DF8F9C;">

                    Entrar

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
                   
  
   




    

    </main>

    <!-- Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS-->
    <script src="js/scripts.js"></script>

</body>
</html>
